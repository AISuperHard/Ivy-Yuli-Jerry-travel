<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Ivy's Seto Drive 2026</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;500&display=swap" rel="stylesheet">
    <link rel="apple-touch-icon" href="https://images.unsplash.com/photo-1596464716127-f2a82984de30?auto=format&fit=crop&q=80&w=300&h=300">
    <style>
        body { font-family: 'Noto Sans TC', sans-serif; background-color: #FDFBF9; color: #444; }
        .day-label { border-left: 4px solid #D4A373; padding-left: 12px; margin: 40px 0 20px 0; font-weight: 500; color: #8B5E3C; font-size: 1.2rem; }
        .spot-card { background: white; border-radius: 20px; box-shadow: 0 2px 15px rgba(0,0,0,0.03); margin-bottom: 16px; overflow: hidden; }
        .nav-btn { background: #4A4A4A; color: white; border-radius: 50px; padding: 6px 16px; font-size: 12px; }
        .time-tag { background: #F3E9DC; color: #8B5E3C; padding: 2px 8px; border-radius: 6px; font-size: 10px; margin-bottom: 8px; display: inline-block; }
    </style>
</head>
<body class="pb-32 px-6">

    <header class="pt-16 pb-4 text-center">
        <h1 class="text-2xl font-light tracking-[0.3em] text-gray-800">瀨戶內海・自駕 8 日 7 夜</h1>
        <p class="text-[10px] text-gray-400 mt-2 tracking-widest italic">IVY • JIELE • YUEYUE</p>
    </header>

    <div class="day-label">DAY 01 | ✈️ 關西機場 ➔ 姬路 | 日本第一名城</div>
    <div class="spot-card">
        <img src="https://images.unsplash.com/photo-1621208642232-4e44435b6b14?q=80&w=800" class="w-full h-40 object-cover">
        <div class="p-5 flex justify-between items-center">
            <div><span class="time-tag">🚗 14:00 關西取車</span><h3 class="text-lg font-medium">關西國際機場 (KIX)</h3></div>
            <a href="http://googleusercontent.com/maps.google.com/KIX" class="nav-btn">導航</a>
        </div>
    </div>
    <div class="spot-card">
        <div class="p-5 border-l-4 border-gray-200 ml-4">
            <span class="time-tag">🚗 17:00 漫步</span>
            <div class="flex justify-between items-center">
                <h3 class="text-lg font-medium">姬路城 (三之丸廣場)</h3>
                <a href="http://googleusercontent.com/maps.google.com/Himeji_Castle" class="nav-btn">導航</a>
            </div>
            <p class="text-xs text-gray-400 mt-2">Ivy 老師說：免爬坡，看最美的白鷺城全景！</p>
        </div>
    </div>
    <div class="spot-card">
        <div class="p-5 border-l-4 border-gray-200 ml-4">
            <span class="time-tag">🍽️ 18:00 晚餐</span>
            <div class="flex justify-between items-center">
                <h3 class="text-lg font-medium">姬路居酒屋時光</h3>
                <a href="http://googlehttp://googleusercontent.com/maps.google.com/himeji_food" class="nav-btn">導航</a>
            </div>
            <p class="text-xs text-gray-400 mt-2">#合成建議：姫路 活水軒</p>
        </div>
    </div>

    </body>
</html>
