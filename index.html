<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Ivy's Japan App</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;500&display=swap" rel="stylesheet">
    <link rel="apple-touch-icon" href="https://images.unsplash.com/photo-1596464716127-f2a82984de30?auto=format&fit=crop&q=80&w=300&h=300">
    <style>
        body { font-family: 'Noto Sans TC', sans-serif; background-color: #FDFBF9; color: #444; }
        .day-label { border-left: 4px solid #D4A373; padding-left: 12px; margin: 35px 0 15px 0; font-weight: 500; color: #8B5E3C; font-size: 1.1rem; }
        .spot-card { background: white; border-radius: 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); margin-bottom: 20px; overflow: hidden; }
        .nav-btn { background: #4A4A4A; color: white; border-radius: 50px; padding: 8px 20px; font-size: 12px; }
        .tag { background: #F3E9DC; color: #8B5E3C; padding: 2px 8px; border-radius: 6px; font-size: 10px; margin-right: 5px; }
    </style>
</head>
<body class="pb-32 px-6">

    <header class="pt-16 pb-4 text-center">
        <h1 class="text-2xl font-light tracking-[0.3em] text-gray-800">瀨戶內海・自駕 2026</h1>
        <p class="text-[10px] text-gray-400 mt-2 tracking-widest uppercase">Ivy • Jiele • YueYue</p>
    </header>

    <div class="day-label">DAY 01 | ✈️ 抵達關西</div>
    <div class="spot-card">
        <img src="https://images.unsplash.com/photo-1570610155223-66279ba81b41?q=80&w=800" class="w-full h-44 object-cover">
        <div class="p-5 flex justify-between items-center">
            <div><span class="tag">14:00</span><h3 class="text-lg font-medium">關西機場取車</h3></div>
            <a href="https://maps.app.goo.gl/3Xp5n5Qf" class="nav-btn">導航</a>
        </div>
    </div>
    <div class="spot-card">
        <img src="https://images.unsplash.com/photo-1621208642232-4e44435b6b14?q=80&w=800" class="w-full h-44 object-cover">
        <div class="p-5 flex justify-between items-center">
            <div><span class="tag">17:00</span><h3 class="text-lg font-medium">姬路城快閃</h3></div>
            <a href="https://maps.app.goo.gl/h3z5n" class="nav-btn">導航</a>
        </div>
    </div>

    <div class="day-label">DAY 02 | ⛩️ 岡山古味</div>
    <div class="spot-card">
        <img src="https://images.unsplash.com/photo-1590559063414-068307223b9d?q=80&w=800" class="w-full h-44 object-cover">
        <div class="p-5 flex justify-between items-center">
            <div><span class="tag">10:30</span><h3 class="text-lg font-medium">吉備津神社</h3></div>
            <a href="https://maps.app.goo.gl/okayama" class="nav-btn">導航</a>
        </div>
    </div>
    <div class="spot-card">
        <img src="https://images.unsplash.com/photo-1493976040374-85c8e12f0c0e?q=80&w=800" class="w-full h-44 object-cover">
        <div class="p-5 flex justify-between items-center">
            <div><span class="tag">15:00</span><h3 class="text-lg font-medium">倉敷美觀地區</h3></div>
            <a href="https://maps.app.goo.gl/kurashiki" class="nav-btn">導航</a>
        </div>
    </div>

    <div class="day-label">DAY 07 | 🎡 神戶親子</div>
    <div class="spot-card">
        <img src="https://images.unsplash.com/photo-1558900664-07301c3491ba?q=80&w=800" class="w-full h-44 object-cover">
        <div class="p-5 flex justify-between items-center">
            <div><span class="tag">10:00</span><h3 class="text-lg font-medium">麵包超人博物館</h3></div>
            <a href="https://maps.app.goo.gl/kobe" class="nav-btn">導航</a>
        </div>
    </div>

    <nav class="fixed bottom-6 left-6 right-6 h-16 bg-white/90 backdrop-blur-md rounded-full shadow-2xl flex items-center justify-around px-8 border border-gray-100">
        <div class="text-center font-bold">📅<br><span class="text-[8px]">行程</span></div>
        <div class="text-center opacity-30">💰<br><span class="text-[8px]">記帳</span></div>
        <div class="text-center opacity-30">🚑<br><span class="text-[8px]">緊急</span></div>
    </nav>
</body>
</html>
